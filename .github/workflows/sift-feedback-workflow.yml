name: Sift Feedback
on:
  pull_request:
    types: [closed]

jobs:
  feedback:
    uses: sahilsaleem2907/sift/.github/workflows/sift-feedback.yml@dev
    with:
      repository: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      merged: ${{ github.event.pull_request.merged }}
    secrets: inherit